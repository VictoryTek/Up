# Rust & Flatpak CI/CD for Up
# Tests, builds, and releases the application as a Flatpak

name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  FLATPAK_MANIFEST: io.github.up.json
  APP_ID: io.github.up

jobs:
  # =============================================================================
  # NATIVE BUILD & TEST
  # =============================================================================
  # Validates the Rust code compiles and passes all checks before Flatpak build
  
  native-build:
    name: Native Build & Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install GTK4 and libadwaita dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            pkg-config \
            cmake \
            ninja-build \
            desktop-file-utils \
            gettext \
            libunwind-dev

      - name: Run cargo fmt check
        run: cargo fmt --check

      - name: Run cargo clippy
        run: cargo clippy -- -D warnings

      - name: Build with cargo
        run: cargo build --release

      - name: Run cargo test
        run: cargo test --release

      - name: Validate desktop file
        run: desktop-file-validate data/io.github.up.desktop

      - name: Validate AppStream metadata
        run: |
          # Install appstream if not present
          if ! command -v appstreamcli &> /dev/null; then
            sudo apt-get install -y appstream
          fi
          appstreamcli validate --no-net data/io.github.up.metainfo.xml

  # =============================================================================
  # FLATPAK BUILD
  # =============================================================================
  # Builds the Flatpak package using GNOME SDK 46 and Rust extension
  
  flatpak:
    name: Flatpak Build
    runs-on: ubuntu-24.04
    needs: native-build
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-46
      options: --privileged
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Flatpak package
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: up-release.flatpak
          manifest-path: ${{ env.FLATPAK_MANIFEST }}
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: true

      - name: Upload to GitHub Releases
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: up-release.flatpak
          fail_on_unmatched_files: false

  # =============================================================================
  # VALIDATION SUMMARY
  # =============================================================================
  # Confirms all CI checks passed
  
  validation:
    name: CI Validation
    runs-on: ubuntu-24.04
    needs: [native-build, flatpak]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "CI Pipeline Summary:"
          echo "✓ Native Build & Test: ${{ needs.native-build.result }}"
          echo "✓ Flatpak Build: ${{ needs.flatpak.result }}"
          echo ""
          if [ "${{ needs.native-build.result }}" != "success" ] || \
             [ "${{ needs.flatpak.result }}" != "success" ]; then
            echo "❌ CI Pipeline failed"
            exit 1
          else
            echo "✅ All CI checks passed successfully"
          fi
