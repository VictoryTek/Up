# Rust & Flatpak CI/CD for Up
# Tests, builds, and releases the application as a Flatpak

name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  FLATPAK_MANIFEST: io.github.up.json
  APP_ID: io.github.up

jobs:
  # =============================================================================
  # NATIVE BUILD & TEST
  # =============================================================================
  # Validates the Rust code compiles and passes all checks before Flatpak build
  
  native-build:
    name: Native Build & Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install GTK4 and libadwaita dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            pkg-config \
            cmake \
            ninja-build \
            desktop-file-utils \
            gettext \
            libunwind-dev

      - name: Run cargo fmt check
        run: cargo fmt --check

      - name: Run cargo clippy
        run: cargo clippy -- -D warnings

      - name: Build with cargo
        run: cargo build --release

      - name: Run cargo test
        run: cargo test --release

      - name: Validate desktop file
        run: desktop-file-validate data/io.github.up.desktop

      - name: Validate AppStream metadata
        run: |
          # Install appstream if not present
          if ! command -v appstreamcli &> /dev/null; then
            sudo apt-get install -y appstream
          fi
          appstreamcli validate --no-net data/io.github.up.metainfo.xml

  # =============================================================================
  # FLATPAK BUILD
  # =============================================================================
  # Builds the Flatpak package using GNOME SDK 50 and Rust extension
  
  flatpak:
    name: Flatpak Build
    runs-on: ubuntu-24.04
    needs: native-build
    permissions:
      contents: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Install flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder xvfb
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub \
            org.gnome.Platform//50 \
            org.gnome.Sdk//50 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Build Flatpak package
        uses: bilelmoussaoui/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: up-release.flatpak
          manifest-path: ${{ env.FLATPAK_MANIFEST }}
          cache-key: flatpak-builder-${{ hashFiles('Cargo.toml', 'io.github.up.json') }}
          upload-artifact: false

      - name: Upload Flatpak bundle as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: up-release.flatpak
          path: up-release.flatpak
          if-no-files-found: ignore

      - name: Upload to GitHub Releases
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: up-release.flatpak
          fail_on_unmatched_files: false

  # =============================================================================
  # FLATPAK OSTREE REMOTE — GITHUB PAGES
  # =============================================================================
  # Exports the Flatpak bundle into an OSTree repository and deploys it to
  # GitHub Pages so users can add a proper Flatpak remote for self-update.
  # Runs only on published releases; requires FLATPAK_GPG_KEY and
  # FLATPAK_GPG_KEY_ID secrets to be configured in the repository settings.
  
  flatpak-remote:
    name: Publish Flatpak Remote
    runs-on: ubuntu-24.04
    needs: flatpak
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Download Flatpak bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: up-release.flatpak

      - name: Set up GPG signing key
        env:
          FLATPAK_GPG_KEY: ${{ secrets.FLATPAK_GPG_KEY }}
          FLATPAK_GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: |
          echo "$FLATPAK_GPG_KEY" | gpg --import
          echo "GPG_KEY_ID=$FLATPAK_GPG_KEY_ID" >> "$GITHUB_ENV"

      - name: Import .flatpak bundle into OSTree repository
        run: |
          mkdir -p ostree-repo
          flatpak build-import-bundle \
            --update-appstream \
            --gpg-sign="$GPG_KEY_ID" \
            ostree-repo up-release.flatpak

      - name: Update repository summary and generate static deltas
        run: |
          flatpak build-update-repo \
            --gpg-sign="$GPG_KEY_ID" \
            --generate-static-deltas \
            ostree-repo

      - name: Export GPG public key alongside the repo
        run: |
          gpg --export --armor "$GPG_KEY_ID" > ostree-repo/io.github.up.gpg
          GPG_B64=$(gpg --export "$GPG_KEY_ID" | base64 -w 0)
          sed -i "s|^GPGKey=.*|GPGKey=$GPG_B64|" data/io.github.up.flatpakrepo
          cp data/io.github.up.flatpakrepo ostree-repo/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ostree-repo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # =============================================================================
  # VALIDATION SUMMARY
  # =============================================================================
  # Confirms all CI checks passed
  
  validation:
    name: CI Validation
    runs-on: ubuntu-24.04
    needs: [native-build, flatpak]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "CI Pipeline Summary:"
          echo "✓ Native Build & Test: ${{ needs.native-build.result }}"
          echo "✓ Flatpak Build: ${{ needs.flatpak.result }}"
          echo ""
          if [ "${{ needs.native-build.result }}" != "success" ] || \
             [ "${{ needs.flatpak.result }}" != "success" ]; then
            echo "❌ CI Pipeline failed"
            exit 1
          else
            echo "✅ All CI checks passed successfully"
          fi
